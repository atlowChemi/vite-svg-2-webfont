name: CI

on:
    push:
        branches:
            - 'main'
    pull_request:

permissions:
    contents: read

jobs:
    packages:
        name: install deps
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@v5
            - name: setup Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: frozen install
              run: pnpm i --frozen-lockfile
    lint:
        name: run lint
        runs-on: ubuntu-latest
        needs: [packages]
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@v5
            - name: setup Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: frozen install
              run: pnpm i --frozen-lockfile --offline
            - name: run lint
              run: node --run lint -- --max-warnings=0
    format:
        name: run format
        runs-on: ubuntu-latest
        needs: [packages]
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@v5
            - name: setup Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: frozen install
              run: pnpm i --frozen-lockfile --offline
            - name: run format
              run: node --run format-check
    build:
        name: run build
        runs-on: ubuntu-latest
        needs: [packages]
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@v5
            - name: setup Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: frozen install
              run: pnpm i --frozen-lockfile --offline
            - name: run build
              run: node --run build
            - uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist
    type-check:
        name: run type-check
        runs-on: ubuntu-latest
        needs: [packages, build]
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@v5
            - name: setup Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
            - name: frozen install
              run: pnpm i --frozen-lockfile --offline
            - uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist
            - name: run type-check
              run: node --run type-check
    test:
        name: run test
        needs: [packages, build]
        strategy:
            matrix:
                node_version: [20.x, 22.x, 24.x, 25.x]
            fail-fast: false
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@v5
            - name: setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node_version }}
                  cache: pnpm
            - name: frozen install
              run: pnpm i --frozen-lockfile --offline
            - uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist
            - name: run coverage test
              run: npm run coverage
            - uses: actions/upload-artifact@v7
              with:
                  name: coverage-${{ matrix.node_version }}
                  path: coverage
