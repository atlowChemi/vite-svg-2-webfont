name: CI

on:
    push:
        branches:
            - 'main'
    pull_request:

permissions:
    contents: read

jobs:
    ci:
        name: lint and check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  components: clippy, rustfmt
            - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      packages/webfont-generator/target
                  key: cargo-${{ runner.os }}-${{ hashFiles('packages/webfont-generator/Cargo.lock') }}
                  restore-keys: cargo-${{ runner.os }}-
            - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
              with:
                  node-version-file: .node-version
                  run-install: true
                  cache: true
            - run: vp check
            - run: vp run @atlowchemi/webfont-generator#test

    build:
        name: Build cross-platform bindings
        needs: [ci]
        uses: ./.github/workflows/build-native.yaml

    test-host:
        name: test ${{ matrix.settings.target }} (node ${{ matrix.node }})
        needs: [build]
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - target: aarch64-unknown-linux-gnu
                      host: ubuntu-24.04-arm
                      architecture: arm64
                    - target: x86_64-apple-darwin
                      host: macos-latest
                      architecture: x64
                    - target: aarch64-apple-darwin
                      host: macos-latest
                      architecture: arm64
                    - target: x86_64-pc-windows-msvc
                      host: windows-latest
                      architecture: x64
                    - target: aarch64-pc-windows-msvc
                      host: windows-11-arm
                      architecture: arm64
                node: ['22', '24', '26']
        runs-on: ${{ matrix.settings.host }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm
                  architecture: ${{ matrix.settings.architecture }}
            - run: pnpm install --frozen-lockfile
            - name: Download binding
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: bindings-${{ matrix.settings.target }}
                  path: packages/webfont-generator/
            - name: Verify binding
              shell: bash
              run: ls packages/webfont-generator/*.node
            - name: Build plugin
              run: pnpm --filter vite-svg-2-webfont exec vp pack
            - name: Run tests
              run: pnpm exec vp test --run

    test-docker:
        name: test ${{ matrix.arch }}-linux-musl
        needs: [build]
        strategy:
            fail-fast: false
            matrix:
                arch: [x86_64, aarch64]
                include:
                    - arch: aarch64
                      args: '--platform linux/arm64'
                      runner: ubuntu-24.04-arm
                    - arch: x86_64
                      args: ''
                      runner: ubuntu-latest
        runs-on: ${{ matrix.runner }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - name: Download binding
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: bindings-${{ matrix.arch }}-unknown-linux-musl
                  path: packages/webfont-generator/
            - name: Build plugin
              run: pnpm --filter vite-svg-2-webfont exec vp pack
            - name: Resolve pnpm version
              id: pnpm-version
              run: echo "version=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).packageManager.split('@')[1].split('+')[0]")" >> "$GITHUB_OUTPUT"
            - name: Run tests
              uses: tj-actions/docker-run@1d25a677da8f1243a138dc5db21e307e92986ffe # v2.2.1
              with:
                  image: node:26-alpine
                  name: test-${{ matrix.arch }}-linux-musl
                  options: ${{ matrix.args }} -v ${{ github.workspace }}:/build -w /build -e CI=true
                  # Pacquet 0.2.x ships glibc-only binaries via @pacquet/linux-*;
                  # spawning them on Alpine fails with ENOENT because the glibc
                  # loader isn't present. Strip the configDependencies block so
                  # this matrix entry falls back to pnpm's JS installer.
                  args: |
                      sh -c "set -e && \
                        npm install -g pnpm@${{ steps.pnpm-version.outputs.version }} && \
                        sed -i '/^configDependencies:/,/^$/d' pnpm-workspace.yaml && \
                        pnpm install --frozen-lockfile --ignore-scripts && \
                        pnpm exec vp test --run"

    test-vite-compat:
        name: test (node ${{ matrix.node_version }}, vite ${{ matrix.vite_major }})
        needs: [build]
        strategy:
            matrix:
                include:
                    - node_version: 22.x
                      vite_major: 8
                      primary: false
                    - node_version: 24.x
                      vite_major: 8
                      primary: false
                    - node_version: 26.x
                      vite_major: 8
                      primary: true
                    - node_version: 26.x
                      vite_major: 6
                      primary: false
                    - node_version: 26.x
                      vite_major: 7
                      primary: false
            fail-fast: false
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
            - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
              with:
                  node-version: ${{ matrix.node_version }}
                  run-install: false
                  cache: false
            - name: Select vite major
              run: node ./scripts/ci/set-vite-major.ts ${{ matrix.vite_major }}
            - run: vp install --no-frozen-lockfile
            - name: Download binding
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: bindings-x86_64-unknown-linux-gnu
                  path: packages/webfont-generator/
            - name: Verify binding
              run: ls packages/webfont-generator/*.node
            - name: Build plugin
              run: vp run vite-svg-2-webfont#pack
            - name: Verify vite version
              run: |
                  VITE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('node_modules/vite/package.json', 'utf8')).version")
                  echo "Resolved vite version: ${VITE_VERSION}"
                  case "${VITE_VERSION}" in
                    ${{ matrix.vite_major }}.*) ;;
                    *)
                      echo "Expected Vite major ${{ matrix.vite_major }}, got ${VITE_VERSION}" >&2
                      exit 1
                      ;;
                  esac
            - name: Run coverage
              if: ${{ matrix.primary }}
              run: vp test --coverage
            - name: Run tests
              if: ${{ !matrix.primary }}
              run: vp test
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: ${{ matrix.primary }}
              with:
                  name: coverage-node-${{ matrix.node_version }}-vite-${{ matrix.vite_major }}
                  path: coverage

    # Single fan-in job for branch protection: matrix job names are dynamic
    # (one per OS × node × vite combination) and would need re-listing in the
    # repo settings every time the matrix changes. Requiring this one job
    # instead covers every dependent without that maintenance burden.
    required-checks:
        name: Required checks
        if: always()
        needs: [ci, build, test-host, test-docker, test-vite-compat]
        runs-on: ubuntu-latest
        steps:
            - name: Verify all dependent jobs succeeded
              run: |
                  if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" \
                     || "${{ contains(needs.*.result, 'cancelled') }}" == "true" \
                     || "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
                      echo "::error::One or more required jobs failed, were cancelled, or were skipped."
                      exit 1
                  fi
                  echo "All required jobs succeeded."
