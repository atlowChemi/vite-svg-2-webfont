name: PR Title

on:
    pull_request:
        types:
            - opened
            - edited
            - reopened
            - synchronize

permissions:
    pull-requests: read

jobs:
    conventional-commit:
        name: Validate conventional commit title
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  scopes: |
                      benchmarks
                      ci
                      deps
                      deps-dev
                      docs
                      example
                      main
                      tests
                      vite-svg-2-webfont
                      webfont-generator
