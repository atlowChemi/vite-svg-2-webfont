name: automatic release

on:
    push:
        tags:
            - v*

permissions:
    contents: read
    id-token: write

jobs:
    release:
        name: release
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@v5
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: .nvmrc
                  run-install: true
                  cache: true
            - name: publish
              run: vp run publish
