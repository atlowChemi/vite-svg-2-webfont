name: Release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    id-token: write
    issues: write
    pages: write
    pull-requests: write

jobs:
    release-please:
        name: Release Please
        runs-on: ubuntu-latest
        outputs:
            plugin-released: ${{ steps.release.outputs['packages/vite-svg-2-webfont--release_created'] }}
            plugin-tag: ${{ steps.release.outputs['packages/vite-svg-2-webfont--tag_name'] }}
            native-released: ${{ steps.release.outputs['packages/webfont-generator--release_created'] }}
            native-tag: ${{ steps.release.outputs['packages/webfont-generator--tag_name'] }}
            any-released: ${{ steps.release.outputs.releases_created }}
        steps:
            - uses: googleapis/release-please-action@v5
              id: release
              with:
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json

            - name: Checkout release PR branch
              if: steps.release.outputs.prs && steps.release.outputs.prs != '[]' && steps.release.outputs.releases_created != 'true'
              uses: actions/checkout@v6
              with:
                  ref: ${{ fromJSON(steps.release.outputs.prs)[0].headBranchName }}

            - name: Setup Vite+
              if: steps.release.outputs.prs && steps.release.outputs.prs != '[]' && steps.release.outputs.releases_created != 'true'
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: .node-version
                  run-install: true
                  cache: true

            - name: Setup Rust toolchain
              if: steps.release.outputs.prs && steps.release.outputs.prs != '[]' && steps.release.outputs.releases_created != 'true'
              uses: dtolnay/rust-toolchain@stable

            - name: Format changelog and sync Cargo.lock
              if: steps.release.outputs.prs && steps.release.outputs.prs != '[]' && steps.release.outputs.releases_created != 'true'
              run: |
                  vp check --fix || true
                  cargo update -p webfont-generator --manifest-path packages/webfont-generator/Cargo.toml
                  node <<'NODE'
                  const fs = require('fs');
                  const { version } = JSON.parse(fs.readFileSync('packages/webfont-generator/package.json', 'utf8'));
                  const file = 'packages/webfont-generator/binding.js';
                  const updated = fs.readFileSync(file, 'utf8')
                    .replaceAll(/bindingPackageVersion !== '[^']+'/g, `bindingPackageVersion !== '${version}'`)
                    .replaceAll(/expected [^ ]+ but got \${bindingPackageVersion}/g, `expected ${version} but got \${bindingPackageVersion}`);
                  fs.writeFileSync(file, updated);
                  NODE
                  if ! git diff --quiet; then
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add -A
                    git commit --no-verify -m "chore: format changelog and sync Cargo.lock"
                    git push
                  fi

    build-native:
        name: Build native binaries
        needs: [release-please]
        if: needs.release-please.outputs.any-released == 'true'
        uses: ./.github/workflows/build-native.yaml

    publish-native:
        name: Publish @atlowchemi/webfont-generator
        needs: [release-please, build-native]
        if: needs.release-please.outputs.native-released == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: .node-version
                  run-install: true
                  cache: true

            - name: Download all binding artifacts
              uses: actions/download-artifact@v8
              with:
                  path: packages/webfont-generator/artifacts
                  pattern: bindings-*

            - name: Create npm dirs
              run: vp exec napi create-npm-dirs --cwd packages/webfont-generator
            - name: Move artifacts
              run: vp exec napi artifacts --cwd packages/webfont-generator
            - name: List packages
              run: ls -R ./packages/webfont-generator/npm
              shell: bash

            - name: Publish
              run: vp pm publish --filter @atlowchemi/webfont-generator

            - name: Upload to native release
              if: needs.release-please.outputs.native-released == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.release-please.outputs.native-tag }}
                  files: packages/webfont-generator/**/*.node

    publish-crate:
        name: Publish to crates.io
        needs: [release-please]
        if: needs.release-please.outputs.native-released == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@stable
            - name: Publish to crates.io
              working-directory: packages/webfont-generator
              run: cargo publish
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    publish-plugin:
        name: Publish vite-svg-2-webfont
        needs: [release-please, build-native]
        if: needs.release-please.outputs.plugin-released == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: .node-version
                  run-install: true
                  cache: true

            - name: Publish from tarball
              run: vp run vite-svg-2-webfont#publish

            - name: Upload release assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.release-please.outputs.plugin-tag }}
                  files: packages/vite-svg-2-webfont/*.tgz

    deploy-docs:
        name: Deploy docs
        needs: [release-please]
        if: needs.release-please.outputs.any-released == 'true'
        uses: ./.github/workflows/docs.yaml
        permissions:
            contents: read
            pages: write
            id-token: write
