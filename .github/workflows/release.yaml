name: Release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    id-token: write
    issues: write
    pull-requests: write

jobs:
    release-please:
        name: Release Please
        runs-on: ubuntu-latest
        outputs:
            plugin-released: ${{ steps.release.outputs['packages/vite-svg-2-webfont--release_created'] }}
            plugin-tag: ${{ steps.release.outputs['packages/vite-svg-2-webfont--tag_name'] }}
            any-released: ${{ steps.release.outputs.releases_created }}
        steps:
            - uses: googleapis/release-please-action@v4
              id: release
              with:
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json

    publish-plugin:
        name: Publish vite-svg-2-webfont
        needs: [release-please]
        if: needs.release-please.outputs.plugin-released == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version-file: .node-version
                  run-install: true
                  cache: true
            - name: Publish from tarball
              run: vp run vite-svg-2-webfont#publish
            - name: Upload release assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.release-please.outputs.plugin-tag }}
                  files: packages/vite-svg-2-webfont/*.tgz
