[package]
name = "webfont-generator"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
flate2 = "1.1.5"
handlebars = "6.3.2"
kurbo = "0.13.0"
md5 = "0.8.0"
napi = { version = "3.8.4", default-features = false, features = ["napi4", "async", "serde-json-ordered"] }
napi-derive = "3.5.3"
rayon = "1.11.0"
roxmltree = "0.21.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
oxvg_path = { version = "0.0.5", default-features = false, features = ["parse", "format", "optimise"] }
tokio = { version = "1", features = ["fs", "macros", "rt", "rt-multi-thread"] }
woff = { version = "0.6.2" }
usvg = "0.47.0"
write-fonts = { version = "0.46.0", features = ["read"] }

[build-dependencies]
napi-build = "2.3.1"

[patch.crates-io]
woff = { path = "patches/woff" }
