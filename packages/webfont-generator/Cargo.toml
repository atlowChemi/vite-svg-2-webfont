[package]
name = "webfont-generator"
version = "0.4.0"
edition = "2024"
license = "MIT"
description = "Generate webfonts (SVG, TTF, EOT, WOFF, WOFF2) from SVG icons"
repository = "https://github.com/atlowChemi/vite-svg-2-webfont"
documentation = "https://docs.rs/webfont-generator"
readme = "README.md"
keywords = ["webfont", "svg", "icon-font", "woff", "opentype"]
categories = ["command-line-utilities", "graphics", "web-programming"]

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "webfont-generator"
required-features = ["cli"]

[features]
default = []
napi = ["dep:napi", "dep:napi-derive"]
cli = ["dep:clap"]
bench = []

[dependencies]
clap = { version = "4", features = ["derive"], optional = true }
flate2 = "1.1.5"
handlebars = "6.4.1"
kurbo = "0.13.1"
md5 = "0.8.0"
napi = { version = "3.9.0", default-features = false, features = ["napi4", "async", "serde-json-ordered"], optional = true }
napi-derive = { version = "3.5.6", optional = true }
rayon = "1.12.0"
roxmltree = "0.21.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
oxvg_path = { version = "0.0.5", default-features = false, features = ["parse", "format", "optimise"] }
tokio = { version = "1", features = ["fs", "macros", "rt", "rt-multi-thread"] }
woff = { version = "0.6.3" }
usvg = "0.47.0"
write-fonts = { version = "0.49.1", features = ["read"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[[bench]]
name = "incremental"
harness = false
required-features = ["bench"]

[[bench]]
name = "pipeline"
harness = false
required-features = ["bench"]

[[bench]]
name = "features"
harness = false
required-features = ["bench"]

[build-dependencies]
napi-build = "2.3.2"
